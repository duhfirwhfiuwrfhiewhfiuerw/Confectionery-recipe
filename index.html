<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제과기능사 레시피</title>

<style>
body{
  margin:0;
  background:linear-gradient(#f6efe6,#efe2d3);
  font-family:'Pretendard', sans-serif;
  display:flex;
  justify-content:center;
}

.app{
  width:390px;
  min-height:100vh;
  background:#fffaf4;
  padding:20px;
  box-sizing:border-box;
  position:relative;
  border-radius:30px;
  border:3px solid #f1e2d3;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
  outline:8px solid #f8efe6;
  outline-offset:8px;
}

/* 🍰 배경 일러스트 */
.app::before{
  content:"🍰 🥐 🍞 🧁 🥖 🍩";
  position:absolute;
  top:20px;
  left:10px;
  font-size:40px;
  opacity:0.08;
  letter-spacing:25px;
  pointer-events:none;
}
.app::after{
  content:"🧁 🍰 🍞 🥐";
  position:absolute;
  bottom:20px;
  right:10px;
  font-size:50px;
  opacity:0.08;
  letter-spacing:20px;
  pointer-events:none;
}

h1{
  text-align:center;
  color:#6b4f3a;
}

/* 🌙 오른쪽 상단 아이콘 버튼 */
.darkToggle{
  position:absolute;
  top:15px;
  right:15px;
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:#f1d6bd;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h3{
  margin-top:25px;
  color:#8b6b55;
}

/* 🔍 검색창 업그레이드 */
input{
  width:100%;
  padding:18px;
  border-radius:30px;
  border:2px solid #e6d7c8;
  margin:25px 0 15px 0;
  box-sizing:border-box;
  font-size:17px;
  background:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

button{
  width:100%;
  margin:8px 0;
  padding:16px;
  border:none;
  border-radius:30px;
  background:#f1d6bd;
  font-weight:bold;
  font-size:16px;
  letter-spacing:1px;
  color:#5c4332;
  cursor:pointer;
  box-shadow:0 6px 0 #d9bfa6;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

button:active{
  transform:translateY(3px);
  box-shadow:0 3px 0 #d9bfa6;
}

.recipeBox{
  margin-top:20px;
  padding:18px;
  background:white;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  border:2px solid #f1e2d3;
}

iframe{
  width:100%;
  height:200px;
  margin-top:15px;
  border-radius:15px;
}
.videoFrame{
  margin-top:20px;
  padding:10px;
  background:#fff3e6;
  border-radius:20px;
  border:3px solid #f1d6bd;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.videoFrame iframe{
  width:100%;
  height:200px;
  border-radius:15px;
}

.dark .videoFrame{
  background:#3a2f28;
  border:3px solid #5a463c;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}
/* 🌙 다크모드 */
.dark{
  background:linear-gradient(#2c2c2c,#1f1f1f);
}

.dark .app{
  background:#2b2b2b;
  color:#f5f5f5;
  border:3px solid #444;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.dark h1{ color:#ffd8b5; }
.dark h3{ color:#ffcc9c; }

.dark input{
  background:#3a3a3a;
  color:white;
  border:1px solid #555;
}

.dark button{
  background:#4a3b32;
  color:#fff3e8;
  box-shadow:0 4px 0 #2f251f;
}

.dark .recipeBox{
  background:#3a3a3a;
  border:2px solid #555;
}

.dark .darkToggle{
  background:#4a3b32;
  color:#fff;
}
</style>
</head>

<body>

<h1>🍰 실기 레시피</h1>

<button onclick="toggleDarkMode()" id="darkBtn" class="darkToggle">🌙</button>

<input type="text" id="searchInput" placeholder="🔍 품목 검색..." oninput="filterRecipes()">

<div id="listPage">
  <div id="buttonArea"></div>
</div>

<div id="detailPage" style="display:none;">
  <button onclick="goBack()">⬅ 뒤로가기</button>
  <div id="recipeDisplay" class="recipeBox"></div>
</div>

</div>

<script>

const buttonArea = document.getElementById("buttonArea");
const display = document.getElementById("recipeDisplay");

function createButtons(filter=""){
  buttonArea.innerHTML="";
  const categories = ["크림법","공립법","별립법","복합법","수작업"];

  categories.forEach(cat=>{
    const section=document.createElement("div");
    section.innerHTML=`<h3>🍞 ${cat}</h3>`;

    for(let name in recipes){
      if(recipes[name].category===cat && name.includes(filter)){
        const btn=document.createElement("button");
        btn.textContent=name;
        btn.onclick=()=>showRecipe(name);
        section.appendChild(btn);
      }
    }
    buttonArea.appendChild(section);
  });
}

createButtons();

function filterRecipes(){
  const keyword=document.getElementById("searchInput").value.trim();
  createButtons(keyword);
}

function showRecipe(name){
  const r = recipes[name];
  document.getElementById("listPage").style.display = "none";
  document.getElementById("detailPage").style.display = "block";

  display.innerHTML = `
    <h2>${name}</h2>
    <p><b>📋 재료</b><br>${r.ingredients}</p>
    <p><b>👩🏻‍🍳 공정</b><br>${r.process}</p>
    <p><b>🔥 오븐</b><br>${r.oven}</p>
    <p><b>⚖️ 비중</b><br>${r.density}</p>
    <p><b>✨ 중요사항</b><br>${r.tips}</p>
    ${r.youtube ? `
      <div class="videoFrame">
        <iframe src="${r.youtube}" frameborder="0" allowfullscreen></iframe>
      </div>
    ` : ""}
  `;
}

function goBack(){
  document.getElementById("listPage").style.display="block";
  document.getElementById("detailPage").style.display="none";
}

/* 🌙 아이콘 토글만 수정 */
function toggleDarkMode(){
  document.body.classList.toggle("dark");
  const btn=document.getElementById("darkBtn");
  btn.textContent=document.body.classList.contains("dark") ? "☀" : "🌙";
}

</script>
</body>
</html>
