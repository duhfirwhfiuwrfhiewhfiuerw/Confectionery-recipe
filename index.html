<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제과기능사 레시피</title>

<style>
body{
  margin:0;
  background:linear-gradient(#f6efe6,#efe2d3);
  font-family:'Pretendard', sans-serif;
  display:flex;
  justify-content:center;overflow-x:hidden;
  position:relative;
}
/* 👋 인트로 화면 */
#splash {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: linear-gradient(#f6efe6, #efe2d3);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Pretendard', sans-serif;
  font-size:60px;
  color:#6b4f3a;
  z-index:9999;
  opacity:1;
  transition: opacity 1s ease;
}
  /* 🍰 인트로용 떨어지는 아이콘 */
#splash .fallingSplash {
    position: absolute;
    top: -50px;
    pointer-events: none;
    animation-name: fallSplash;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

@keyframes fallSplash {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(120vh) rotate(360deg); }
}
/* 🌧 떨어지는 아이콘 애니메이션 */
.falling {
    position: absolute;
    top: -50px;
    pointer-events: none;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(120vh) rotate(360deg); }
}

.app{
  display:none; /* ⬅ 인트로 나오기 전 숨김 */
  width:390px;
  min-height:100vh;
  background:#fffaf4;
  padding:20px;
  box-sizing:border-box;
  position:relative;
  border-radius:30px;
  border:3px solid #f1e2d3;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
  outline:8px solid #f8efe6;
  outline-offset:8px;
}

/* 🍰 배경 일러스트 */
.app::before{
  content:"🍰 🥐 🍞 🧁 🥖 🍩";
  position:absolute;
  top:20px;
  left:10px;
  font-size:40px;
  opacity:0.08;
  letter-spacing:25px;
  pointer-events:none;
}
.app::after{
  content:"🧁 🍰 🍞 🥐";
  position:absolute;
  bottom:20px;
  right:10px;
  font-size:50px;
  opacity:0.08;
  letter-spacing:20px;
  pointer-events:none;
}

h1{
  text-align:center;
  color:#6b4f3a;
}h3{color:#6b4f3a; margin-top:20px;}
/* 🌙 / 🎵 토글 버튼 크기 키움 */
.switch {
  position: relative;
  display: inline-block;
  width: 90px;
  height: 40px;
  margin-bottom: 15px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

/* 공통 슬라이더 스타일 */
.slider {
  position: relative;
  cursor: pointer;
  border-radius: 34px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  font-size: 18px;
  transition: 0.4s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  border-radius: 50%;
  transition: 0.4s;
  z-index: 2;
}

input:checked + .slider:before {
  transform: translateX(36px); /* 슬라이더 이동 */
}

input:checked + .slider.darkSlider {
  background-color: #f1d6bd;
}

#bgmSwitch:checked + .slider {
  background-color: #4a3b32;
}
/* 🔍 검색창 업그레이드 */
input{
  width:100%;
  padding:18px;
  border-radius:30px;
  border:2px solid #e6d7c8;
  margin:25px 0 15px 0;
  box-sizing:border-box;
  font-size:17px;
  background:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

button{
  width:100%;
  margin:8px 0;
  padding:16px;
  border:none;
  border-radius:30px;
  background:#f1d6bd;
  font-weight:bold;
  font-size:16px;
  letter-spacing:1px;
  color:#5c4332;
  cursor:pointer;
  box-shadow:0 6px 0 #d9bfa6;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
}

button:active{
  transform:translateY(3px);
  box-shadow:0 3px 0 #d9bfa6;
}

.recipeBox{
  margin-top:20px;
  padding:18px;
  background:white;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  border:2px solid #f1e2d3;
}

iframe{
  width:100%;
  height:200px;
  margin-top:15px;
  border-radius:15px;
}
.videoFrame{
  margin-top:20px;
  padding:10px;
  background:#fff3e6;
  border-radius:20px;
  border:3px solid #f1d6bd;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.videoFrame iframe{
  width:100%;
  height:200px;
  border-radius:15px;
}

.dark .videoFrame{
  background:#3a2f28;
  border:3px solid #5a463c;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
}
/* 🌙 다크모드 */
.dark{
  background:linear-gradient(#2c2c2c,#1f1f1f);
}

.dark .app{
  background:#2b2b2b;
  color:#f5f5f5;
  border:3px solid #444;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.dark h1{ color:#ffd8b5; }
.dark h3{ color:#ffcc9c; }

.dark input{
  background:#3a3a3a;
  color:white;
  border:1px solid #555;
}

.dark button{
  background:#4a3b32;
  color:#fff3e8;
  box-shadow:0 4px 0 #2f251f;
}

.dark .recipeBox{
  background:#3a3a3a;
  border:2px solid #555;
}

/* 🔘 슬라이드 토글 (큰 사이즈 + 아이콘) */
.switch {
  position: relative;
  display: inline-block;
  width: 70px;
  height: 34px;
  margin-bottom: 15px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider{
  position:absolute;
  cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background-color:#f1d6bd;
  transition:0.4s;
  border-radius:34px;
  display:flex;
  align-items:center;
  justify-content:space-between; /* 왼쪽/오른쪽으로 아이콘 배치 */
  padding:0 8px;
  font-size:18px;
}
.slider:before {
  position: absolute;
  content: " ";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: 0.4s;
  border-radius: 50%;
}

input:checked + .slider:before {
  transform: translateX(36px);
}

/* 다크모드 색상 변경 */
  .slider.darkSlider {
  background-color: #f1d6bd;
}
input:checked + .slider.darkSlider {
  background-color: #4a3b32;
}

/* 브금 색상 변경 */
.slider.bgmSlider {
  background-color: #f1d6bd;
}
input:checked + .bgmSlider {
  background-color: #d98b8b;
}
/* 아이콘 스타일 */
.slider .icon-left,
.slider .icon-right {
  pointer-events: none; /* 아이콘 클릭 막기 */
  font-size: 18px;
  z-index: 1; /* 슬라이더 동그라미 위로 올라오지 않게 */
}
</style>
</head>
<body>

<!-- 🎉 인트로 -->
<div id="splash">🍰 JSHG</div>
<div class="app">

<h1>🍰 실기 레시피</h1>
<!-- 다크모드 토글 -->
<label class="switch" style="position:absolute; top:15px; right:15px;">
  <input type="checkbox" id="darkSwitch">
  <span class="slider darkSlider">
    <span class="icon-left">🌙</span>
    <span class="icon-right">☀️</span>
  </span>
</label>

<!-- BGM 토글 -->
<label class="switch" style="position:absolute; top:65px; right:15px;">
  <input type="checkbox" id="bgmSwitch">
  <span class="slider bgmSlider">
    <span class="icon-left">🔇</span>
    <span class="icon-right">🔊</span>
  </span>
</label>

<input type="text" id="searchInput" placeholder="🔍 품목 검색..." oninput="filterRecipes()">

<div id="listPage">
  <div id="buttonArea"></div>
</div>

<div id="detailPage" style="display:none;">
  <button onclick="goBack()">⬅ 뒤로가기</button>
  <div id="recipeDisplay" class="recipeBox"></div>
</div>

<!-- YouTube BGM iframe (숨김) -->
<div id="bgmFrame" style="width:0;height:0;overflow:hidden;position:absolute;top:0;left:0;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ✅ 슬라이드 아이콘 표시
function updateSliderIcons(sliderId){
  const input = document.getElementById(sliderId);
  const slider = input.nextElementSibling;
  function updateIcon(){
    slider.textContent = input.checked ? slider.dataset.on : slider.dataset.off;
  }
  input.addEventListener("change", updateIcon);
  updateIcon();
}
updateSliderIcons("darkSwitch");
updateSliderIcons("bgmSwitch");

const recipes = {
"시퐁케이크": { category:"별립법", ingredients:`박력분,설탕A,설탕B,달걀,소금,베이킹파우더,식용유,물`, process:`1.노른자에 설탕A와 소금을 넣고 섞고 중탕한 물 식용유 넣고 섞은다음 체친가루를 넣고 섞어주세요. 2.흰자를 반죽기에 넣어 설탕을 3번에 나누어 머랭을 만들어주세요. 3.노른자반죽에 머랭을 반씩 나누어 섞어주세요. 4.비중을 측정한 뒤 작은볼로 떠올려 시퐁팬에 팬닝을 해주고 젓가락으로 휘휘저으며 기포제거해주세요. 5.오븐에 30분 굽고 뒤집어서 식힌 뒤 틀을 조심히 빼주고 마무리해주세요.`, oven:`170/150도 30분`, density:`0.4~0.5`, tips:`틀에 물을 충분히 분무하기,계란분리하기`, youtube:`https://www.youtube.com/embed/Ad5LwgpMKsE` },
"마들렌": { category:"수작업", ingredients:`박력분,베이킹파우더,설탕,달걀,레몬껍질,소금,버터`, process:`1.체친가루에 소금설탕 넣고, 계란한번에 투입해서 섞은다음 유지섞고 레몬껍질 넣고 섞어주세요 2.랩으로씌워 20분정도 상온에서 휴지시켜주세요. 3.짤주머니에 깍지넣고 지그재그로 짜서 팬닝해주세요. 4.오븐에 15분 황금색으로 굽고 마무리해주세요.`, oven:`180/160도 12분~15분`, density:`비중없음`, tips:`버터 40~50도 녹여주기,마들렌틀에 쇼트닝 발라주기`, youtube:`https://www.youtube.com/embed/b3Lo-sCZ84g` },
"버터스펀지 공립": { category:"공립법", ingredients:`박력분,설탕,달걀,소금,바닐라향,버터`, process:`1.계란풀어주고 설탕,소금넣고 섞어주세요. 2.중탕한 버터내리고 계란반죽 중탕물에 올려 45~50도 사이가 될때까지 저어주세요. 3.버터를 다시 중탕물에 옮기고 계란반죽은 반죽기에 넣어 고속으로 거품을 올려주세요. 4.계란반죽에 체친가루 넣고 섞은다음 버터에 반죽소량 넣고 다시 섞어주세요. 5.비중체크를 해주세요 6.틀에 골고루 팬닝 후 충격을 주고 기포를 없애주세요. 7.오븐에 25분 굽고 마무리해주세요.`, oven:`170/150도 25분`, density:`0.4~0.5`, tips:`버터중탕,유산지재단`, youtube:`https://www.youtube.com/embed/0ShXaLllxwI` },
"초코머핀": { 
category:"크림법",
ingredients:`박력분, 설탕, 버터, 달걀, 소금, 베이킹소다, 베이킹파우더, 코코아파우더, 물, 탈지분유, 초코칩`,
process:`1.계란을 중탕해주고 코코아가루는 뜨거운물에 전처리해줍니다.
2.반죽기에 유지를 투입하고 풀어준뒤 설탕소금을 두세번 투입하여 섞어줍니다.
3.계란 하나씩 투입하고 스크래핑작업을 반복해줍니다.
4.반죽에 가루를 투입하고 긁어주듯 섞어주고 물에 불린코코아가루를 투입 후 섞어준뒤 초코칩을 80% 넣어줍니다.
5.짤주머니에 반죽을 담은 후 틀 바닥 1센치에서 움직이지않고 짜주면서 일정하게 팬닝해줍니다.
6.나머지 초코칩을 위에골고루 뿌려주고 오븐에 25분 구워주고 마무리해줍니다.`,
oven:`170/160도 25분`,
density:`비중 없음`,
tips:`코코아파우더 물에 불리기`,
youtube:`https://www.youtube.com/embed/p3ccdzOTIHM`
},
"파운드케이크": { category:"크림법", ingredients:`박력분,설탕,버터,유화제,소금,탈지분유,바닐라향,베이킹파우더,달걀`, process:`1.믹싱볼에 유지 투입하고 설탕,소금,유화제를 2~3번에 나누어 투입해주세요. 2.계란을 1개에서 2개 투입하고 고속,스크래핑 반복해주세요(크림법은 항상 계란중탕) 3.계란반죽에 체친가루 넣고 섞어주세요. 4.비중을 측정한 후 짤주머니에 반죽을 넣고 일정하게 팬닝해주세요. 5.끝부분은 젓가락을 이용해 각지게 만들어주고 주걱으로 음푹 파인 형태로 만들어주세요. 6.오븐에 높은온도로 10분 굽고 빼준뒤 커터칼로 칼집내주고 오븐온도 낮춘뒤 30분 구워주고 마무리해주세요.`, oven:`210/150도 10분 굽고 칼집 일자로 내준뒤 170/160도 30분 굽기`, density:`0.75~0.85`, tips:`유산지재단,유지풀어주기`, youtube:`https://www.youtube.com/embed/Nvr1XY3jsdA` },
"소프트롤케이크": { category:"별립법", ingredients:`박력분,설탕A,물엿,소금,물,바닐라향,설탕B,달걀,베이킹파우더,식용유`, process:`1.노른자에 설탕A,소금,물엿 두번에 나누어 거품내주기 2.물을 넣어 설탕을 완전히 녹여주세요 3.흰자를 반죽기에 넣고 고속으로 거품을 올리고 설탕을 나누어 머랭을 만들어주세요 4.노른자반죽에 머랭을 2/1넣고 섞고 가루재료를 넣고 섞은뒤 데친 식용유에 반죽을 덜어 섞어주고 남은 머랭을 섞어주세요. 5.비중을 측정합니다 6.반죽 소량을 덜어 무늬만들 반죽 준비하고 7.반죽을 철판에 평평하게 팬닝한 뒤 무늬를 그려놓습니다. 8.오븐에 15분 굽고 광목천에 뒤집고 잼바른후 마무리해줍니다.`, oven:`170/150도 15분`, density:`0.45~0.55`, tips:`계란분리,유산지재단,식용유중탕`, youtube:`https://www.youtube.com/embed/lr1XYc9TLs8` },
"쇼트브레드쿠키": { category:"크림법", ingredients:`박력분,마가린,쇼트닝,설탕,소금,물엿,달걀,노른자,바닐라향`, process:`1.큰볼에 마가린과 쇼트닝을 넣어 부드럽게 풀어주세요. 2.물엿과 설탕을 섞어주고,계란노른자,전란을 섞어주세요. 체친가루를 넣고 가로로 가르듯이 섞어준뒤 비닐에 반죽을 붓고 지그시 눌러주고 밀대로 밀어펴주세요. 3.냉장휴지 20분 뒤 반죽을 나누어 밀대로 얇게 펴주고(덧가루사용) 밀어편 반죽에 커터를 이용하여 찍고 지그재그로 팬닝해주세요. 4. 노른자를 두번 바르고 포크로 모양을 내준뒤 오븐에 15분 굽고 마무리해주세요.`, oven:`180/140도 15분`, density:`비중없음`, tips:`노른자 바르기용 준비,소금전란에 넣기`, youtube:`https://www.youtube.com/embed/snbslIcPyo0` },
"다쿠와즈": { category:"수작업", ingredients:`달걀흰자,설탕,아몬드분말,분당,박력분`, process:`1.머랭만들기-달걀흰자 넣고 설탕 두번 나누어 머랭 몽글하게 만들어주세요 (120%) 2.머랭에 체친가루넣고 가르듯이 섞어주세요 3.짤주머니에 반죽넣고 지그재그나 동그라미 가운데로 짜주세요. 4.스크래퍼로 위아래로 스쳐지나가듯 정리후에 틀 빼주고 똑같이 짜주세요. 5.분당가루 너무많이 뿌리지말고 적당히 보일정도만 뿌려주세요. 6.오븐에 20분 구워준뒤 크림을 발라 마무리해주세요.`, oven:`180/140도 20분`, density:`비중없음`, tips:`달걀분리,철판에 테프론시트깔기`, youtube:`https://www.youtube.com/embed/JKwImylHo8Y` },
"타르트": { category:"크림법", ingredients:`(반죽)박력분,달걀,설탕,버터,소금 (충전물)아몬드분말,설탕,버터,달걀,브랜디 (광택제 및 토핑)아몬드슬라이스,에프리코트혼당,물`, process:`1.반죽) 버터 볼에 풀어준 뒤 설탕 섞어주세요. 2.달걀에 소금을 넣어 3번씩나누어 섞어준뒤 박력분을 넣고 가르듯이 섞어주세요. 3.비닐에 반죽을 붓고 지그시 눌러주며 섞은 뒤 냉장휴지를 충분히 시켜주세요. (충전물) 버터를 볼에 풀어준뒤 설탕을 나눠넣고 달걀을 나눠넣고 브랜디를 섞은뒤 아몬드분말을 체쳐 섞어주세요. (성형) 냉장휴지를 해놓은 반죽을 7등분으로 나누어 반죽을 밀대로 덧가루를 사용하며 밀어주면서 면적을 틀에 맞게 피고, 틀에 넣어 반죽 남은부분을 밀대로 밀어 떼어내주세요. 아래바닥을 포크로 마구잡이로 뚫어주고 똑같이 7개를 다 만들어준 다음 나머지 반죽도 똑같이 성형하여 총 8개를 만들어주세요. 충전물을 일정하게 짜준 뒤 위에 아몬드슬라이스를 뿌려주세요. (오븐및 광택제) 오븐에 25분 굽고 혼당과 물 혼합 후 버너에 끓여준 뒤 붓으로 빠르게 발라주며 마무리해주세요.`, oven:`180/190도 25분`, density:`비중없음`, tips:`반죽휴지 중요`, youtube:`https://www.youtube.com/embed/5RSp4TpCTwk` },
"브라우니": { category:"수작업", ingredients:`중력분,달걀,설탕,소금,버터,다크초콜릿,코코아파우더,바닐라향,호두`, process:`1.철판에 유산지 깔고 호두 전처리를 해주세요. 2.계란풀어주고 설탕,소금 투입후 섞어주세요(중탕물에 옮겨 30~40도로 맞추기) 3.초콜릿과 버터 중탕물에 50도가 넘어가지않게 녹여주세요. 4.계란반죽에 녹인초콜릿을 조금씩 부어가며 섞어주세요. 5.가루를 넣고 섞어주세요 거품기->주걱 6.호두를 반 넣고 섞은 뒤 팬닝해주세요. 7.남은 호두를 위에 골고루 뿌려주고 오븐에 35분 구워주고 마무리 해주세요`, oven:`170/150도 35분`, density:`비중없음`, tips:`호두 5분 전처리,유산지재단`, youtube:`https://www.youtube.com/embed/GXskgbI6CuM` },
"버터스펀지 별립": { category:"별립법", ingredients:`박력분,설탕A,설탕B,달걀,소금,베이킹파우더,바닐라향,용해버터`, process:`1.노른자 반죽: 노른자에 소금과 설탕(A)을 3번에 나누어 넣으며 아이보리색이 날 때까지 휘핑합니다 (중탕 이용).
2.머랭 만들기: 흰자에 설탕(B)을 3번에 나누어 넣으며 고속으로 단단한 머랭을 만듭니다 (너무 몽글거리지 않게 주의).
3.반죽 섞기: 노른자 반죽에 머랭 1/2을 먼저 섞습니다.
4.체 친 가루(박력분, BP, 바닐라향)를 넣고 가볍게 섞습니다.
5.희생 반죽: 녹인 버터에 반죽 일부를 덜어 섞은 뒤 다시 본 반죽에 합칩니다 (기름 분리 방지).
6.남은 머랭 1/2을 넣고 거품이 죽지 않게 빠르게 마무리합니다.
7.비중 측정: (반죽 무게 ÷ 물 무게)를 계산하여 목표 비중(0.5~0.6)을 확인합니다.
8.팬닝 및 굽기: 팬에 일정 높이로 담아 170/150°C 오븐에서 25분간 굽습니다.`, oven:`170/150도 25분`, density:`0.5~0.6`, tips:`유산지재단,계란분리`, youtube:`https://www.youtube.com/embed/qIWtfqlblv4` },
"젤리롤케이크": { category:"공립법", ingredients:`박력분,설탕,달걀,소금,물엿,베이킹파우더,우유,바닐라향`, process:`1.중탕: 계란에 설탕, 물엿, 소금을 넣고 45~50°C가 될 때까지 중탕하여 설탕을 완전히 녹입니다.

2.휘핑: 반죽기 고속으로 돌려 풍성한 거품을 올립니다.

3.혼합: 가루 재료를 섞고, 중탕한 우유에 반죽 소량을 덜어 섞은 뒤 본 반죽과 합칩니다.

4.무늬: 반죽 소량에 카라멜 색소를 섞어 짤주머니로 표면에 체크 무늬를 그립니다.

5.마무리: 구워진 시트를 광목천에 뒤집어 딸기잼을 바르고 말아줍니다.`, oven:`170/150도 15분`, density:`0.4~0.5`, tips:`유산지재단`, youtube:`https://www.youtube.com/embed/5mOVza2NzpA` },
"버터쿠키": { category:"크림법", ingredients:`박력분,버터,설탕,소금,달걀,바닐라향`, process:`1.버터 18~20도로 맞춰준뒤 풀어주고 설탕과소금 나눠 섞어주고 달걀 한개분량씩 넣어 거품을 내주세요. 2.어느정도 섞이면 체친가루를 넣고 섞어준다음 짤주머니에 반죽을 넣어주세요. 3.팬닝 판에 지그재그로 팬닝을 해주세요 (장미모양, 8자모양) 4.오븐에 15분 굽고 마무리 해주세요.`, oven:`190/150도 15분`, density:`비중없음`, tips:`거품 충분히 올려주기`, youtube:`https://www.youtube.com/embed/CiMxw4zT20w` },
"흑미롤케이크": { category:"공립법", ingredients:`박력쌀가루,흑미쌀가루,설탕,달걀,소금,베이킹파우더,우유`, process:`1.달걀 풀어주고 설탕섞고 소금섞고 중탕물 45~50도로 저어주세요. 2.반죽기에 계란반죽 넣고 3단으로 거품 올려주세요. 3.체친가루를 넣고 빠르게 섞어준뒤 희생반죽을 우유에 넣고 섞어주세요. 4.비중체크후 일정하게 팬닝한 뒤 오븐에 15분 굽고 타공팬에 옮겨 냉각하는 동안 생크림을 만들어주세요. 5.뒤집어서 생크림을 바르고 말아준 뒤 마무리해주세요`, oven:`180/150도 15분`, density:`0.4~0.5`, tips:`유산지재단,냉각 충분히 시켜주기,우유 중탕`, youtube:`https://www.youtube.com/embed/-RVbn2TiaKI` },
"마데라컵케이크": { category:"크림법", ingredients:`박력분,버터,설탕,소금,달걀,베이킹파우더,건포도,호두,적포도주`, process:`1.버터 18~20도 맞춰주고 반죽기에 3단으로 풀어준 다음 설탕,소금 두번나눠 3단 돌려주세요. 2.달걀 중탕물에 담구고 1개분량씩 나눠넣으며 3단 돌리고 스크래핑 작업 반복해주세요. 3.크림반죽에 체친가루 섞어준뒤 적포도주 섞어주고 건포도 호두 섞어주세요. 4.짤주머니에 넣고 팬닝 일정하게 해준뒤 오븐에 25분 구워주세요. 5.오븐 5분 전에 퐁당 제조 후 골고루 도포해준 뒤 오븐에 5분 더 구워주세요.`, oven:`170/150도 25분`, density:`비중없음`, tips:`건포도씻기,호두굽기,머핀틀준비`, youtube:`https://www.youtube.com/embed/Yrsn6kdOKCs` },
"호두파이": { category:"수작업", ingredients:`(껍질)중력분,노른자,소금,설탕,생크림,버터,물 (충전물)호두,설탕,물엿,계피가루,물,달걀`, process:`(껍질)물에 노른자,설탕,소금,생크림 넣고 섞기. 체친중력분에 버터 다지기. 비닐로 옮겨 반죽물 붓고 손으로 누르고 뭉쳐준다음 마무리(휴지 20분) (토핑물)중간볼에 물,설탕,물엿,계피가루를 넣어주고 중탕해주세요. 계란을 체로 내려주고 설탕물을 넣어 섞어주세요. (성형)휴지된 반죽을 둥글리기 하고 원형으로 눌러준뒤 밀대로 덧가루와 함께 밀어주세요(틀크기보다 크게) 틀 바깥안쪽으로 밀어준뒤 스크래퍼로 겉부분을 제거해 바닥쪽을 포크로 마구잡이로 뚫어주세요. 그다음 충전물 부어주고 오븐에 30분 구운 뒤 마무리해주세요.`, oven:`170/200도 30분`, density:`비중없음`, tips:`호두 굽기,노른자계량,파이틀에 쇼트닝바르기`, youtube:`https://www.youtube.com/embed/4FQWCpyKZfI` },
"슈": { category:"수작업", ingredients:`물,버터,소금,중력분,달걀(커스타드크림)`, process:`1.중볼에 물,버터,소금 투입후 버너 강불로하고 살살 저어주며 버터를 녹여주세요. 2.체친가루를 넣고 섞어주면서 호화를시켜주세요(얇은막) 3.반죽을 다른 볼에 옮겨 계란을 나눠넣으며 반죽상태를 봐가며 투투툭 끊어지는 느낌으로 만들어주세요. 4.짤주머니에 반죽을 넣고 팬에 지그재그로 팬닝을 해주세요. 5.분무기로 물을 충분히 뿌려준뒤 뿔을 제거해주세요. 6.오븐에 25분 굽고 뺀다음 젓가락으로 아래 구멍을 뚫어 짤주머니를 이용해 크림을 넣어주세요`, oven:`170/180도로 20분 굽고 170/160도로 낮추고 5분굽기`, density:`비중없음`, tips:`슈는 호화가 중요함`, youtube:`https://www.youtube.com/embed/dYr1lUV2QwI` },
"치즈케이크": { category:"복합법", ingredients:`중력분,버터,설탕A,설탕B,달걀,크림치즈,우유,럼주,레몬주스`, process:`1.중탕한 버터와 크림치즈를 풀어주세요. 설탕을 넣고 풀어준 뒤 노른자를 넣고 섞어주세요. 럼주와 레몬주스도 함께 섞어주세요. 2.머랭을 만들때에는 흰자를 섞어주고 설탕을 넣은다음 70%만 주르륵 떨어지는 느낌으로 만들어주세요. 3.크림치즈반죽에 머랭섞어준뒤 비커에 넣어 80%만 팬닝해주세요. 비중도 체크해주세요. 4.팬을 올리고 중탕한 물을 부워준뒤 오븐에 굽고 마무리해주세요.`, oven:`190/150도로 17분 구워준뒤 템퍼열고 180/150도 15분 구워주기`, density:`0.7~0.8`, tips:`계란분리,틀에 쇼트닝바르고 설탕뿌려주기,굽기전 중탕물 꼭 철판에부워주기`, youtube:`https://www.youtube.com/embed/Sz_A6j1Cl9o` },
"초코롤케이크": { category:"공립법", ingredients:`박력분,달걀,설탕,코코아파우더,베이킹소다,물,우유,생크림,럼`, process:`1.달걀을 풀어주고 설탕을 넣은다음 중탕물 40~50도로 섞어주세요. 2.반죽기에 계란물 붓고 3단으로 거품을 올려주세요. 3.체친가루 넣고 섞어주고, 데친우유와 물에 반죽을 소량덜어 섞어주세요. 4.비중체크 후 오븐에 15분 구워주세요. 5.커버춰를 중탕하고 생크림은 50도까지 중탕한 뒤 초콜릿에 생크림을 부워주고 섞음다음 럼을 추가해주세요. 6.반죽에 가나슈를 바르고 말아준다음 마무리해주세요.`, oven:`180/150도 15분`, density:`0.4~0.5`, tips:`우유중탕,유산지재단`, youtube:`https://www.youtube.com/embed/lwBC21gOVPc` },
"과일케이크": { category:"별립법", ingredients:`박력분,설탕,마가린,달걀,우유,베이킹파우더,소금,건포도,체리,호두,오렌지필,럼주,바닐라향`, process:`1.유지를 부드럽게 풀어주고 설탕 2~3번 나눠 섞은 뒤 노른자를 3번 나누어 섞어주고,중탕한 우유와 럼주를 넣어서 섞어주세요. 2.믹싱볼에 흰자를 넣고 설탕을 반씩 넣으며 고속으로 머랭을 만들어주세요. 3.노른자반죽에 머랭을 2/1 투입하여 떠올리듯 섞어주고 가루를 넣어 섞어주고 전처리된 과일을 넣어 섞어주고 마지막 남은 머랭을 넣어 섞어주세요. 4.짤주머니에 반죽을 넣어 일정하게 팬닝 후 젓가락으로 매꿔주세요. 5.오븐에 35분 구워주고 마무리해주세요.`, oven:`170/150도 35분`, density:`비중없음`, tips:`유산지재단,계란분리,우유중탕,건포도물로씻기,체리다지기(물기짜기),전처리과일들 밀가루에 버무리기`, youtube:`https://www.youtube.com/embed/1A_wRdqcl1I` }
};

// 레시피 버튼 생성
const buttonArea = document.getElementById("buttonArea");
const display = document.getElementById("recipeDisplay");

function createButtons(filter=""){
  buttonArea.innerHTML="";
  const categories = ["크림법","공립법","별립법","복합법","수작업"];

  categories.forEach(cat=>{
    const section=document.createElement("div");
    section.innerHTML=`<h3>🍞 ${cat}</h3>`;
    let hasRecipe=false;

    for(let name in recipes){
      if(recipes[name].category===cat && name.includes(filter)){
        hasRecipe=true;
        const btn=document.createElement("button");
        btn.textContent=name;
        btn.onclick=()=>showRecipe(name);
        section.appendChild(btn);
      }
    }

    if(hasRecipe){
      buttonArea.appendChild(section);
    }
  });
}

createButtons();

function filterRecipes(){
  const keyword=document.getElementById("searchInput").value.trim();
  createButtons(keyword);
}

// 레시피 상세 페이지
function showRecipe(name){
  const r = recipes[name];
  document.getElementById("listPage").style.display = "none";
  document.getElementById("detailPage").style.display = "block";

  display.innerHTML = `
    <h2>${name}</h2>
    <p><b>📋 재료</b><br>${r.ingredients}</p>
    <p><b>👩🏻‍🍳 공정</b><br>${r.process}</p>
    <p><b>🔥 오븐</b><br>${r.oven}</p>
    <p><b>⚖️ 비중</b><br>${r.density}</p>
    <p><b>✨ 중요사항</b><br>${r.tips}</p>
    ${r.youtube ? `
      <div class="videoFrame">
        <iframe src="${r.youtube}" frameborder="0" allowfullscreen></iframe>
      </div>
    ` : ""}
  `;
}


function goBack(){
  document.getElementById("listPage").style.display="block";
  document.getElementById("detailPage").style.display="none";
}
// 🎉 인트로용 아이콘 생성
function createSplashIcons(){
  const icons = ["🍰","🧁","🥐","🥖","🍩"];
  for(let i=0;i<15;i++){
    const span = document.createElement("span");
    span.textContent = icons[Math.floor(Math.random()*icons.length)];
    span.style.left = Math.random()*100 + "vw";
    span.style.fontSize = 20 + Math.random()*30 + "px";
    span.style.opacity = 0.1 + Math.random()*0.2;
    span.style.animationDuration = 5 + Math.random()*5 + "s";
    span.classList.add("fallingSplash");
    document.getElementById("splash").appendChild(span);
  }
}
function createFallingIcons(){
  const icons = ["🍰","🧁","🥐","🥖","🍩"];
  for(let i=0;i<30;i++){
    const span = document.createElement("span");
    span.textContent = icons[Math.floor(Math.random()*icons.length)];
    span.style.left = Math.random()*100 + "vw";
    span.style.fontSize = 20 + Math.random()*30 + "px";
    span.style.opacity = 0.05 + Math.random()*0.15;
    span.style.animationDuration = 10 + Math.random()*15 + "s";
    span.classList.add("falling");
    document.body.appendChild(span);
  }
}
// 🌓 다크모드 슬라이드
const darkSwitch = document.getElementById("darkSwitch");
darkSwitch.addEventListener("change", function() {
  document.body.classList.toggle("dark", this.checked);
});

// 🎵 BGM 슬라이드
const bgmSwitch = document.getElementById("bgmSwitch");
let player;
let bgmReady = false;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('bgmFrame', {
    height: '0',
    width: '0',
    videoId: 'GI-u9-X8ka8',
    playerVars: { autoplay: 1, loop: 1, playlist: 'GI-u9-X8ka8', mute:1 },
    events: { 
      onReady: function() { 
        bgmReady = true;
        player.playVideo(); // muted 상태로 먼저 재생
      } 
    }
  });
}

bgmSwitch.addEventListener("change", function() {
  if(!bgmReady) return;
  if(this.checked){
    player.unMute(); // 소리 켜기
    player.playVideo();
  } else {
    player.pauseVideo();
  }
});
// 🎉 인트로 자동 처리
window.addEventListener("load",()=>{
  createSplashIcons();
  createFallingIcons();
setTimeout(()=>{
  const splash = document.getElementById("splash");
  splash.style.opacity=0;
  setTimeout(()=>{
    splash.style.display="none";
    document.querySelector(".app").style.display="block";
  },1000);
},2000); // 3초 → 2초
});
</script>
